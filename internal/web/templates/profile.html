{{define "content"}}
<h1>Profile</h1>
<form method="post" action="/profile" class="stack card narrow">
  <input type="hidden" name="csrf_token" value="{{.CSRF}}">
  <label>Username <input type="text" value="{{.User.Username}}" disabled></label>
  <label>Display name <input type="text" name="name" value="{{.User.Name}}"></label>
  <label>Organisation <input type="text" name="organisation" value="{{.User.Organisation}}"></label>

  <h2>BLAST settings</h2>
  <p class="muted">Applied to your NCBI BLAST runs.</p>
  <label>Min coverage (0–1)
    <input type="number" name="blast_min_coverage" min="0" max="1" step="0.01" value="{{.User.BlastMinCoverage}}" required>
  </label>
  <label>Min identity (0–1)
    <input type="number" name="blast_min_identity" min="0" max="1" step="0.01" value="{{.User.BlastMinIdentity}}" required>
  </label>
  <label>Hitlist size
    <input type="number" name="blast_hitlist_size" min="1" step="1" value="{{.User.BlastHitlistSize}}" required>
  </label>

  <h2>Dashboard</h2>
  <label>Recent runs shown (1–50)
    <input type="number" name="dashboard_run_count" min="1" max="50" step="1" value="{{.User.DashboardRunCount}}" required>
  </label>

  <button type="submit">Save</button>
</form>
{{end}}
